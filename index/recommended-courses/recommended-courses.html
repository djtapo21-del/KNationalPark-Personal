<section class="recommended-courses">
    <div class="recommended-courses__header">
        <h2 class="recommended-courses__title">추천 코스</h2>
        <a href="#" class="recommended-courses__more">+ 더 보기</a>
    </div>

    <div class="recommended-courses__content">
        <button class="carousel-btn carousel-btn--prev" type="button" aria-label="이전 코스">
            <svg class="carousel-btn__icon" aria-hidden="true"><use href="#icon-arrow-prev"></use></svg>
        </button>
        <button class="carousel-btn carousel-btn--next" type="button" aria-label="다음 코스">
            <svg class="carousel-btn__icon" aria-hidden="true"><use href="#icon-arrow-next"></use></svg>
        </button>

        <div class="carousel-wrap">
            <div class="course-list" id="course-list">
                <div class="carousel-slide">
                    <a href="#" class="course-card">
                        <span class="course-card__level course-card__level--low">초급</span>
                        <div class="course-card__body">
                            <strong>설악산</strong>
                            <span>약 3시간 · 약 4km</span>
                        </div>
                        <div class="course-card__route">
                            <span>소공원 → 울산바위</span>
                        </div>
                    </a>
                    <a href="#" class="course-card">
                        <span class="course-card__level course-card__level--mid">중급</span>
                        <div class="course-card__body">
                            <strong>북한산</strong>
                            <span>약 4시간 · 약 7km</span>
                        </div>
                        <div class="course-card__route">
                            <span>대남문 → 백운대</span>
                        </div>
                    </a>
                    <a href="#" class="course-card">
                        <span class="course-card__level course-card__level--high">고급</span>
                        <div class="course-card__body">
                            <strong>지리산</strong>
                            <span>약 6시간 · 약 10km</span>
                        </div>
                        <div class="course-card__route">
                            <span>장터목 → 천왕봉</span>
                        </div>
                    </a>
                </div>
                <div class="carousel-slide">
                    <a href="#" class="course-card">
                        <span class="course-card__level course-card__level--high">고급</span>
                        <div class="course-card__body">
                            <strong>한라산</strong>
                            <span>약 5시간 · 약 9km</span>
                        </div>
                        <div class="course-card__route">
                            <span>성판악 → 정상</span>
                        </div>
                    </a>
                    <a href="#" class="course-card">
                        <span class="course-card__level course-card__level--low">초급</span>
                        <div class="course-card__body">
                            <strong>오대산</strong>
                            <span>약 2시간 · 약 3km</span>
                        </div>
                        <div class="course-card__route">
                            <span>월정사 → 상원사</span>
                        </div>
                    </a>
                    <a href="#" class="course-card">
                        <span class="course-card__level course-card__level--mid">중급</span>
                        <div class="course-card__body">
                            <strong>무등산</strong>
                            <span>약 3.5시간 · 약 6km</span>
                        </div>
                        <div class="course-card__route">
                            <span>증심사 → 서석대</span>
                        </div>
                    </a>
                </div>
                <div class="carousel-slide">
                    <a href="#" class="course-card">
                        <span class="course-card__level course-card__level--mid">중급</span>
                        <div class="course-card__body">
                            <strong>치악산</strong>
                            <span>약 4시간 · 약 8km</span>
                        </div>
                        <div class="course-card__route">
                            <span>구룡사 → 비로봉</span>
                        </div>
                    </a>
                    <a href="#" class="course-card">
                        <span class="course-card__level course-card__level--low">초급</span>
                        <div class="course-card__body">
                            <strong>소백산</strong>
                            <span>약 3시간 · 약 5km</span>
                        </div>
                        <div class="course-card__route">
                            <span>죽령 → 비로봉</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 모바일 드래그/스와이프 연동 Dot 슬라이더 -->
    <div class="carousel-dots">
        <span class="carousel-dot active" data-index="0"></span>
        <span class="carousel-dot" data-index="1"></span>
        <span class="carousel-dot" data-index="2"></span>
    </div>
</section>
