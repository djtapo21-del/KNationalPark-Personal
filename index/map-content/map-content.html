<section class="map-container">
    <div class="map-container__header">
        <h2 class="map-container__title">탐방통제정보</h2>
    </div>
    <div class="map-container__image-area">
        <img src="/images/korea_map.png" alt="한국 국립공원 지도" class="map-container__image" draggable="false" />

        <!-- 국립공원 레이블은 JS(map.js)에서 parkData를 기반으로 자동 렌더링됩니다. -->

        <!-- 우측 하단 안내 가이드 -->
        <div class="map-container__guide">
            <div class="map-container__legend">
                <div class="map-container__legend-item">
                    <span class="legend-swatch legend-swatch--normal"></span> 정상
                </div>
                <div class="map-container__legend-item">
                    <span class="legend-swatch legend-swatch--partial"></span> 부분통제
                </div>
                <div class="map-container__legend-item">
                    <span class="legend-swatch legend-swatch--closed"></span> 전면통제
                </div>
            </div>
            <p>산 이름을 선택하여<br>날씨 정보를 확인해보세요.</p>
        </div>

    </div><!-- /.map-container__image-area -->
</section><!-- /.map-container -->
